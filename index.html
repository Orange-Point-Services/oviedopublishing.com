<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Oviedo Publishing — Quality books for doers</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: #F1E9D7;
    color: #1F1A14;
  }
  button { font: inherit; cursor: pointer; }
  a { text-decoration: none; }

  /* shared classes */
  .ovd-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .ovd-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .ovd-display {
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    font-size: clamp(72px, 9vw, 156px);
    line-height: 0.9;
    letter-spacing: -0.025em;
    margin: 24px 0 0;
    text-wrap: balance;
  }
  .ovd-display em {
    font-style: italic;
    font-weight: 500;
  }
  .ovd-section-title {
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    font-size: clamp(36px, 4vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0;
    text-wrap: balance;
  }
  .ovd-section-title em {
    font-style: italic;
    font-weight: 500;
  }
  .ovd-lede {
    font-family: 'EB Garamond', serif;
    font-size: 19px;
    line-height: 1.5;
    margin: 24px 0 0;
    text-wrap: pretty;
  }
  .ovd-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    display: block;
  }
  .ovd-input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: none;
    padding: 12px 0;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: inherit;
  }
  .ovd-input::placeholder { color: currentColor; opacity: 0.5; }
  .ovd-arrow {
    background: transparent;
    border: 0;
    padding: 12px 0 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .ovd-textlink {
    background: transparent; border: 0; padding: 0;
    font: inherit; text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 0.5px;
  }
  .ovd-nav {
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    position: relative;
  }
  .ovd-nav::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -4px;
    height: 0.5px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }
  .ovd-nav:hover::after { transform: scaleX(1); }
  .ovd-coverbtn {
    background: transparent;
    border: 0;
    padding: 0;
    width: 100%;
    transition: transform 0.3s ease;
  }
  .ovd-coverbtn:hover { transform: translateY(-2px); }
  .ovd-readmore {
    margin-top: 24px;
    background: transparent;
    border: 0;
    border-bottom: 0.5px solid;
    padding: 4px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    display: inline-block;
  }
  .ovd-bookheader {
    background: transparent;
    border: 0;
    padding: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    text-align: left;
  }
  .ovd-dl {
    background: transparent;
    border: 0;
    padding: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 0.5px;
  }
  .ovd-mail {
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 0.5px;
  }
  .ovd-bigmail {
    display: inline-block;
    margin-top: 32px;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 26px;
    text-decoration: underline;
    text-underline-offset: 6px;
    text-decoration-thickness: 0.5px;
  }
  .ovd-back {
    background: transparent;
    border: 0;
    padding: 0;
    font-family: 'EB Garamond', serif;
    font-size: 16px;
  }
  .ovd-bigdl {
    background: transparent;
    border: 0;
    border-bottom: 0.5px solid;
    padding: 6px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* selection */
  ::selection { background: #1F1A14; color: #F1E9D7; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
